# Alembic configuration.
#
# The database URL is intentionally NOT hardcoded here. alembic/env.py loads it
# from the app's Settings (DIRECT_URL, falling back to DATABASE_URL) so the
# connection string lives in one place — the git-ignored .env file.

[alembic]
# Path to the migration environment (env.py + versions/).
script_location = alembic

# Template used to generate migration file names; the date prefix keeps them
# sortable in the versions/ directory.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Make "alembic" importable when running migrations from the project root.
prepend_sys_path = .

# Timezone for file_template timestamps (UTC keeps them unambiguous).
timezone = UTC

# sqlalchemy.url is set programmatically in env.py; leave blank here.
sqlalchemy.url =


# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
